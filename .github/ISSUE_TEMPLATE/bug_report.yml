name: 缺陷反馈
description: 反馈 Chat MVP beta 中坏掉或被阻塞的流程。
title: "[缺陷]: "
labels:
  - bug
body:
  - type: dropdown
    id: severity
    attributes:
      label: 严重程度
      description: 用于外测分诊。P0/P1 会优先处理。
      options:
        - P0 - 大多数测试者无法继续
        - P1 - 核心聊天路径被阻塞
        - P2 - 明显体验问题
        - P3 - 后续优化
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 测试版本
      placeholder: v0.2.1-beta / https://chat-mvp-tau.vercel.app
    validations:
      required: true
  - type: input
    id: tester
    attributes:
      label: 测试者
      description: 本次 beta 测试使用的测试者代号或邮箱。
      placeholder: 测试者 A / tester-a@example.com
  - type: input
    id: device
    attributes:
      label: 设备和浏览器
      placeholder: iPhone Safari、Android Chrome、桌面 Chrome
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 影响区域
      options:
        - 注册/登录
        - 个人资料/头像
        - 好友申请
        - 单聊
        - 群聊
        - 搜索
        - 附件
        - 通知
        - 权限/安全
        - 移动端布局
        - 其他
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: 请按顺序写出导致问题的操作步骤。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
      placeholder: 你原本期望发生什么？
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
      placeholder: 实际发生了什么？
    validations:
      required: true
  - type: textarea
    id: media
    attributes:
      label: 截图或录屏
      placeholder: 如果方便，请附上截图、录屏或相关日志。
