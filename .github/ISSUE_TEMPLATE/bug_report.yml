name: Bug report
description: Report a broken or blocked Chat MVP beta flow.
title: "[Bug]: "
labels:
  - bug
body:
  - type: input
    id: tester
    attributes:
      label: Tester
      description: Tester label or email used for the beta test.
      placeholder: tester-a@example.com
  - type: input
    id: device
    attributes:
      label: Device and browser
      placeholder: iPhone Safari, Android Chrome, desktop Chrome
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: List the exact steps that led to the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: textarea
    id: media
    attributes:
      label: Screenshot or recording
      placeholder: Attach screenshots, recordings, or logs if available.

