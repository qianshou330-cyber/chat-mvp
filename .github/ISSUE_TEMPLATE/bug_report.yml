name: 缺陷反馈
description: 反馈 Chat MVP beta 中坏掉或被阻塞的流程。
title: "[缺陷]: "
labels:
  - bug
body:
  - type: input
    id: tester
    attributes:
      label: 测试者
      description: 本次 beta 测试使用的测试者代号或邮箱。
      placeholder: 测试者 A / tester-a@example.com
  - type: input
    id: device
    attributes:
      label: 设备和浏览器
      placeholder: iPhone Safari、Android Chrome、桌面 Chrome
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: 请按顺序写出导致问题的操作步骤。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
      placeholder: 你原本期望发生什么？
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
      placeholder: 实际发生了什么？
    validations:
      required: true
  - type: textarea
    id: media
    attributes:
      label: 截图或录屏
      placeholder: 如果方便，请附上截图、录屏或相关日志。

