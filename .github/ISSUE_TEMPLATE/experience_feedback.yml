name: Experience feedback
description: Share confusing, slow, unclear, or awkward beta experience.
title: "[Feedback]: "
labels:
  - feedback
body:
  - type: input
    id: tester
    attributes:
      label: Tester
      placeholder: tester-a@example.com
  - type: input
    id: area
    attributes:
      label: Area
      placeholder: Login, chat list, direct chat, group, attachment, profile
    validations:
      required: true
  - type: textarea
    id: feedback
    attributes:
      label: Feedback
      placeholder: What felt confusing, slow, unclear, or awkward?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      placeholder: What would make this better?

