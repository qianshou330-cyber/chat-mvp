name: 体验反馈
description: 反馈 beta 中看不懂、不顺手、太慢或布局不舒服的地方。
title: "[体验]: "
labels:
  - question
body:
  - type: input
    id: tester
    attributes:
      label: 测试者
      placeholder: 测试者 A / tester-a@example.com
  - type: input
    id: area
    attributes:
      label: 所在区域
      placeholder: 登录、聊天列表、单聊、群聊、附件、个人资料
    validations:
      required: true
  - type: textarea
    id: feedback
    attributes:
      label: 反馈内容
      placeholder: 哪个地方让你困惑、觉得慢、不顺手或不舒服？
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: 改进建议
      placeholder: 你觉得怎样会更好？
